<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pub Prop Raw Review</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #171a1f;
        color: #f4efe6;
      }

      body {
        margin: 0;
        padding: 24px;
        background: #171a1f;
      }

      header {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 20px;
        border-bottom: 1px solid #34302a;
        padding-bottom: 14px;
      }

      h1 {
        margin: 0;
        font-size: 24px;
        font-weight: 700;
        letter-spacing: 0;
      }

      #summary {
        margin: 0;
        color: #cbbf9f;
        font-size: 14px;
      }

      #grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 14px;
      }

      .card {
        border: 1px solid #38352f;
        border-radius: 6px;
        background: #22262d;
        overflow: hidden;
      }

      .preview {
        min-height: 140px;
        display: grid;
        place-items: center;
        padding: 12px;
        background-color: #2c3139;
        background-image:
          linear-gradient(45deg, #242932 25%, transparent 25%),
          linear-gradient(-45deg, #242932 25%, transparent 25%),
          linear-gradient(45deg, transparent 75%, #242932 75%),
          linear-gradient(-45deg, transparent 75%, #242932 75%);
        background-position: 0 0, 0 8px, 8px -8px, -8px 0;
        background-size: 16px 16px;
      }

      img {
        max-width: 100%;
        max-height: 120px;
        image-rendering: pixelated;
      }

      .meta {
        padding: 10px;
        display: grid;
        gap: 4px;
      }

      .filename {
        font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
        font-size: 13px;
        color: #fff6df;
        overflow-wrap: anywhere;
      }

      .dimensions {
        font-size: 12px;
        color: #cbbf9f;
      }

      .error {
        padding: 16px;
        border: 1px solid #6e443a;
        border-radius: 6px;
        background: #2f211f;
        color: #ffd7cb;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Pub Prop Raw Review</h1>
      <p id="summary">Loading manifest...</p>
    </header>
    <main id="grid" aria-live="polite"></main>

    <script>
      const grid = document.querySelector('#grid');
      const summary = document.querySelector('#summary');

      fetch('./manifest.json', { cache: 'no-store' })
        .then((response) => {
          if (!response.ok) throw new Error('manifest.json was not found in this raw folder');
          return response.json();
        })
        .then((manifest) => {
          const objects = Array.isArray(manifest.objects) ? manifest.objects : [];
          summary.textContent = `${objects.length} raw object candidates`;

          if (objects.length === 0) {
            grid.innerHTML = '<p class="error">No objects were found in manifest.json.</p>';
            return;
          }

          grid.innerHTML = '';
          for (const object of objects) {
            const card = document.createElement('article');
            card.className = 'card';

            const preview = document.createElement('div');
            preview.className = 'preview';

            const image = document.createElement('img');
            image.src = object.filename;
            image.alt = object.filename;
            image.loading = 'lazy';
            preview.append(image);

            const meta = document.createElement('div');
            meta.className = 'meta';

            const filename = document.createElement('div');
            filename.className = 'filename';
            filename.textContent = object.filename;

            const dimensions = document.createElement('div');
            dimensions.className = 'dimensions';
            dimensions.textContent = object.width && object.height ? `${object.width} x ${object.height}px` : 'size unavailable';

            meta.append(filename, dimensions);
            card.append(preview, meta);
            grid.append(card);
          }
        })
        .catch((error) => {
          summary.textContent = 'Review unavailable';
          grid.innerHTML = `<p class="error">${error.message}. Run the extraction step first, then reload this page.</p>`;
        });
    </script>
  </body>
</html>
